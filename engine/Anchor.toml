[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
distin = "2KNozrxEXtW6bzm741Egw4R79B8AnxX33yJG5rkJAHUd"

[programs.devnet]
distin = "2KNozrxEXtW6bzm741Egw4R79B8AnxX33yJG5rkJAHUd"

[programs.mainnet]
distin = "2KNozrxEXtW6bzm741Egw4R79B8AnxX33yJG5rkJAHUd"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000

[test.validator]
url = "https://api.mainnet-beta.solana.com"
